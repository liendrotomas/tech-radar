name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt

      - name: Run tests
        run: |
          python -mpytest tests/.

      - name: Run dry pipeline
        run: |
          uv run python main.py --dry-run

      - name: Fail fast if pipeline returns empty
        run: |
          uv run python main.py --dry-run | tee output.txt
          grep "Filtered 0" output.txt && exit 1 || true
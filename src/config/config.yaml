# Tech Radar configuration (YAML)
# Supports source-specific credentials and thresholds.

ingestion:
  rss:
    urls:
      - "https://techcrunch.com/feed/"
      - "https://thenextweb.com/feed/"
      - "http://export.arxiv.org/rss/cs.AI"

      # Papers
      - "https://arxiv.org/rss/cs.RO"
      - "https://arxiv.org/rss/eess.AS"      
      - "http://export.arxiv.org/rss/cs.AI"
      - "http://export.arxiv.org/rss/cs.CV"
      - "http://export.arxiv.org/rss/cs.LG"

      # Industry
      - "https://techcrunch.com/tag/robotics/feed/"
      - "https://techcrunch.com/tag/space/feed/"
      - "https://spacenews.com/feed/"

      # Research engineering
      - "https://spectrum.ieee.org/rss/robotics/fulltext"
      - "https://www.technologyreview.com/feed/"
      - "https://technology.nasa.gov/rss.xml"

      # Defense
      - "https://www.darpa.mil/rss"

      # Hardware
      - "https://hackaday.com/blog/feed/"

      # Startups
      - "https://news.crunchbase.com/feed/"

      # Patents
      - "https://patents.google.com/rss/search?q=robotics"

      # Tech general
      - "https://techcrunch.com/feed/"

      # Startups / VC
      - "https://www.ycombinator.com/blog/feed"

      # Optional
      - "https://www.producthunt.com/feed"

      - https://www.nasa.gov/rss/dyn/breaking_news.rss
      - https://www.nasa.gov/rss/dyn/technology.rss
      - https://www.nasa.gov/rss/dyn/artemis.rss
      - https://api.www.sbir.gov/public/api/solicitations
      - https://www.darpa.mil/news-events
      - https://www.darpa.mil/news-events
      - http://sci.esa.int/newssyndication/rss/sciweb.xml
      - https://www.nsf.gov/rss/funding.xml
      - https://www.nsf.gov/rss/upcoming-due-dates.xml
      - https://api.www.sbir.gov/public/api/solicitations
      - https://www.ycombinator.com/blog
      - https://www.techstars.com/newsroom

  scraping:
    enabled: false
    max_items: 5
    urls:
      - https://www.nasa.gov/centers/jpl/news/
      - https://www.csail.mit.edu/news
      - https://www.therobotreport.com/robotics-news/
      - https://www.nasa.gov/robotics-news/
      - https://news.stanford.edu/research-and-scholarship
      - https://www.azorobotics.com/news-index.aspx

  sns_list:
    enabled: false
    max_items: 5
    users:
      # - nasa
      # - SpaceX
      - robohub
      - IEEE_RAS
      - roboticsnews
      - techcrunch
      - YCombinator
      - Techstars
      - Figure_robot
      - BostonDynamics
      - deepmind
      # - OpenAI
      - nvidia
      - elonmusk
      - satyanadella
      - karpathy
      - ianbremmer
      - AndrewYNg

  queries:
    enabled: false
    max_items: 5
    sources:
      - "robotics startup"
      - "autonomous systems"
      - "AI agents"
      - "humanoid robot"
      - "space robotics"

  labs:
      - name: mit_csail
        base_url: https://www.csail.mit.edu/news
        article_selector: "a.card__title"
      - name: stanford_ai
        base_url: https://ai.stanford.edu/blog/
        article_selector: "h2 a"
      - name: berkeley_bair
        base_url: https://bair.berkeley.edu/blog/
        article_selector: "h2.entry-title a"


agents:
  filter:
    signal_threshold: 0.03
    noise_threshold: 0.02
    # Define keyword categories for easy extension
    KEYWORD_CATEGORIES :
        - ai : ["AI","artificial intelligence","machine learning","LLM","neural network","deep learning"]
        - robotics: ["robotics", "robot", "automation", "autonomous"]
        - startup: ["startup","founder","venture","startup opportunity","investment"]
        - trending: ["breakthrough","launch","raises","open source","new model","benchmark","research"]
    

    NOISE_KEYWORDS :
        - "newsletter"
        - "opinion"
        - "roundup"
        - "weekly recap"
        - "sponsored"
        - "press release"
        - "earnings call"
        - "stock price"
        - "celebrity"
        - "gossip"
        - "lifestyle"
        - "how to use chatgpt"
        - "beginner guide"
        - "top 10 tools"
        - "click here"
        - "subscription"
        - "war"
        - "politics"
        - "celebrity"
        - "iran"
        - "russia"
        - "ukraine"
        - "trump"
        - "biden"
        - "exclusive"
        - "apps"
        - "ios"
        - "android"
        - "events"

  enrichment:
    model: "gpt-4.1-mini"
  opportunity:
    model: "gpt-4.1-mini"
  scoring:
    model: "gpt-4.1-mini"
